name: civonix
description: "Civonix - Next-generation crypto portfolio intelligence and social analytics platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # HTTP & Networking
  dio: ^5.4.3+1
  web_socket_channel: ^3.0.1

  # Supabase
  supabase_flutter: ^2.5.6

  # Secure Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # Charts
  fl_chart: ^0.69.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5

  # Misc
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.2
  connectivity_plus: ^6.0.5
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
